<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <title>ゆうまのページ</title>

    <!-- PWA -->
    <!-- <link rel="manifest" href="/manifest.json" /> -->

    <!-- 検索エンジンに載せない -->
    <meta name="robots" content="noindex, nofollow">

    <!-- Android / Chrome -->
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">

    <!-- iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- CSS -->
    <link rel="stylesheet" href="./css/style.css" />

    <!-- Googlefont -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap"
        rel="stylesheet">

    <!-- font-awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body>

    <div class="yuuma-page">

        <!-- ヘッダー -->
        <header class="page-header text-center pt-4">
            <div class="flex">
                <button class="btn btn--back px-6" onclick="history.back()">
                    <i class="fa-solid fa-rotate-left"></i>
                </button>
                <div class="flex justify-center w-full pr-20">
                    <div class="flex flex-col">
                        <h1 class="page-title">
                            <i class="fa-solid fa-child-reaching"></i>
                            ゆうまのページ
                        </h1>
                        <p class="page-subtitle" id="today-label">
                            きょうは〇ようび
                        </p>
                    </div>
                </div>
            </div>
        </header>

        <!-- メイン -->
        <main class="page-main l-container bg-sub py-4 px-4">

            <!-- 今日の予定・持ち物 -->
            <section class="card schedule bg-white">
                <h2 class="card-title flex items-center">
                    <i class="fa-solid fa-calendar-day"></i>
                    今日のよてい
                </h2>

                <ul class="schedule__list" id="schedule-list">
                    <!-- JSで曜日ごとに差し替え -->
                    <!--
        <li>🏫 がっこう</li>
        <li>🚌 デイサービス</li>
        -->
                </ul>

                <h3 class="card-subtitle">
                    <i class="fa-solid fa-backpack"></i>
                    もちもの
                </h3>

                <ul class="belongings__list" id="belongings-list">
                    <!-- JSで曜日ごとに差し替え -->
                </ul>
            </section>

            <!-- 帰宅後のやること -->
            <section class="card tasks bg-white">
                <h2 class="card-title">
                    <i class="fa-solid fa-list-check"></i>
                    帰ってきてから やること
                </h2>

                <ul class="tasks__list" id="task-list">
                    <!-- JSで最大5個表示 -->
                    <!--
        <li class="task">
            <span class="task__icon">🎒</span>
            <span class="task__label">かばんをおく</span>
            <span class="task__result hanamaru"></span>
        </li>
        -->
                </ul>
            </section>

            <!-- 家族の伝言 -->
            <section class="card message bg-white flex flex-col justify-between">
                <div>
                    <h2 class="card-title">
                        <i class="fa-solid fa-comment-dots"></i>
                        今日の でんごん
                    </h2>

                    <ul class="message__list" id="extra-task-list">
                        <!-- 手入力で追加されるタスク -->
                    </ul>

                    <!-- 入力欄（あしゃ用） -->
                    <form class="message__form" id="extra-task-form">
                        <input type="text" id="extra-task-input" placeholder="ついかのやること" autocomplete="off" />
                        <button type="submit" class="btn btn--add">
                            <i class="fa-solid fa-plus"></i>
                        </button>
                    </form>
                    <button type="button" id="extra-task-reset" class="btn btn--reset">
                        <i class="fa-solid fa-rotate-left"></i>
                        ぜんぶリセット
                    </button>


                </div>
                <div>
                    <!-- ゆうまページのどこか -->
                    <button class="stamp-open-btn btn btn--primary">リングフィットスタンプカード</button>

                    <!-- スタンプカードスライド -->
                    <section id="stamp-panel" class="stamp-panel">
                        <header class="stamp-header">
                            <button class="stamp-close-btn">← もどる</button>
                            <h2>リングフィットスタンプカード</h2>
                        </header>

                        <div class="stamp-body">
                            <!-- スタンプカードUI -->
                            <section class="stamp-card">
                                <h3 class="stamp-card__title">ゆうま、パパ、あしゃでがんばってできました！</h3>

                                <div class="stamp-grid">
                                    <!-- 10マス -->
                                    <div class="stamp is-filled">🌸</div>
                                    <div class="stamp is-filled">🌸</div>
                                    <div class="stamp">○</div>
                                    <div class="stamp">○</div>
                                    <div class="stamp">○</div>

                                    <div class="stamp">○</div>
                                    <div class="stamp">○</div>
                                    <div class="stamp">○</div>
                                    <div class="stamp">○</div>
                                    <div class="stamp">○</div>
                                </div>

                                <button class="stamp-action-btn">スタンプをおす</button>
                                <button class="stamp-reset-btn">リセット</button>
                            </section>
                        </div>
                    </section>
                </div>
            </section>



        </main>

    </div>

    <!-- jQuery（ゆうまページ専用） -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>

    <!-- 共通JS -->
    <script type="module" src="/src/assets/scripts/yuuma.js"></script>
    <!-- 花丸達成オーバーレイ -->
    <div id="hanamaru-overlay" class="hanamaru-overlay  is-hidden">
        <div class="hanamaru__content">
            <img src="/images/stamp_full.png" alt="" class="hanamaru__mark img-wrapper img-wrapper-1-1"/>
            <p class="hanamaru__text">10こ たまったよ！<br>すごいね！！</p>
            <button class="hanamaru__btn">OK</button>
        </div>
    </div>
</body>

</html>
